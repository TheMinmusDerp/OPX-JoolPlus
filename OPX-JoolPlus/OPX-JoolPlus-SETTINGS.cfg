// Modify these settings to customize your game

@Kopernicus:BEFORE[OPX-JoolPlus]
{
    OPX_JoolPlus_Settings
    {
        JoolRevamp = True // True or False, defaults to True
        RealisticMoonSizes = True // True or False, defaults to True
        RealisticMoonOrbits = True // True or False, defaults to True
        BopTrojan = True // True or False, defaults to True
        UsePseudobodies = False // True or False, defaults to True
        LaytheAtmoChallenge = False // True or False, defaults to False
        MinorPlanetNumbers = True // True or False, defaults to True
    }
}
//EXPLANATIONS
//BopTrojan - defaults to true, places Bop in Klip's L5 point. If set to false, Bop's position is in the far outer Jool system as an irregular outer moon. False overrides RealisticMoonOrbits.
//JoolRevamp - defaults to true, changes Jool's texture
//RealisticMoonSizes - defaults to true, resizes Laythe, Vall, Tylo, and Bop. If false, they remain at their stock scales.
//RealisticMoonOrbits – defaults to true, moves Laythe, Vall, Tylo, and Bop to more reasonable positions
//UsePseudobodies – defaults to true, adds small optional bodies to fill out the system
//LaytheAtmoChallenge – makes Laythe's atmosphere thicker and more challenging to compensate for its smaller size
//MinorPlanetNumbers – appends minor planet designations to the ingame names of Molypele, Pakran-Manaris, and Betazed. Descriptions are unchanged.
