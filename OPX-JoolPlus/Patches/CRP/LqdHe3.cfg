// trace amounts on Jimel, Molypele, Khaun, Pakran, Manaris, and Betazed
//
//	Community Resource Pack
//	Resource: LqdHe3
//
//Resource types:  
//	0 = Crustal			(Stuff you dig up)
//	1 = Oceanic			(Stuff in the oceans)
//	2 = Atmospheric		(Stuff in the air, varies with pressure)
//	3 = Interplanetary	(Stuff you find between planets)
//
//Express all numbers as percentages 0.0-100.0, not 0.0-1.0!
//

PLANETARY_RESOURCE:NEEDS[CommunityResourcePack]
{
	ResourceName = DummyHelium
	ResourceType = 0
	PlanetName = Jimel

	Distribution
	{
		PresenceChance = 100
		MinAbundance = 0.000000060
		MaxAbundance = 0.000000060
		Variance = 0
		Dispersal = 1
	}
}
