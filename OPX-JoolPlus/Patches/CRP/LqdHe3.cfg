@PLANETARY_RESOURCE[*]:HAS[#ResourceName[DummyHelium],#ResourceType[0]]:NEEDS[FarFutureTechnologies,!OPX-InnerWorlds]:FINAL
{
	@Distribution
	{
		@MinAbundance *= 100000000
		@MaxAbundance *= 100000000
	}
}

// Uncloak helium-3

@PLANETARY_RESOURCE[*]:HAS[#ResourceName[DummyHelium]]:FINAL
{
	@ResourceName = LqdHe3
}
