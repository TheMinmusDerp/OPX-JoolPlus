@Kopernicus:AFTER[OPX-JoolPlus]:HAS[@OPX_JoolPlus_Settings:HAS[#MinorPlanetNumbers[True]]]
{
    @Body[Molypele]
    {
        @Properties
        {
            %displayName = #LOC_OPX-JP_Molypele_Name_Alt
        }
    }
    @Body[Khaun]
    {
        @Properties
        {
            %displayName = #LOC_OPX-JP_Khaun_Name_Alt
        }
    }
    @Body[Pakran]
    {
        @Properties
        {
            %displayName = #LOC_OPX-JP_Pakran_Name_Alt
        }
    }
    @Body[Manaris]
    {
        @Properties
        {
            %displayName = #LOC_OPX-JP_Manaris_Name_Alt
        }
    }
    @Body[Betazed]
    {
        @Properties
        {
            %displayName = #LOC_OPX-JP_Betazed_Name_Alt
        }
    }
}
