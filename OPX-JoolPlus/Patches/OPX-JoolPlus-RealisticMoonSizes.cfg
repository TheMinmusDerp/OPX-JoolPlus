@Kopernicus:HAS[@OPX_JoolPlus_Settings:HAS[#RealisticMoonSizes[True]]]:FOR[zOPX-JoolPlus]
{
    @Body[Laythe]
    {
        %Properties
		{
			%radius = 293800
			%geeASL = 0.29
		}
    }
    @Body[Vall]
    {
        %Properties
		{
			%radius = 156080
			%geeASL = 0.134
		}
    }
    @Body[Tylo]
    {
        %Properties
		{
			%radius = 320400
			%geeASL = 0.25
			%ScienceValues
			{
				landedDataValue = 10
				inSpaceLowDataValue = 8
				inSpaceHighDataValue = 6
				recoveryValue = 6
				spaceAltitudeThreshold = 10000
			}
		}
    }
    @Body[Bop]
    {
        %cacheFile:NEEDS[!TPR] = OPX-JoolPlus/Cache/BopNew.bin
		%cacheFile:NEEDS[TPR] = OPX-JoolPlus/Cache/BopNewTPR.bin
		@Properties
		{
			%radius = 19500
			%geeASL = 0.002
		}
		@PQS
		{
			@Mods
			{
				@VertexSimplexHeightAbsolute:NEEDS[!TPR]
				{
					%deformity *= 0.3
				}
				@VertexHeightNoise:NEEDS[!TPR]
				{
					%deformity *= 0.3
				}
				@VertexMitchellNetravaliHeightMap[_Height1]:NEEDS[TPR]
				{
					%deformity *= 0.3
					%offset *= 0.3
				}
				@VertexMitchellNetravaliHeightMap[_Height2]:NEEDS[TPR]
				{
					%offset *= 0.3
				}
				@VertexMitchellNetravaliHeightMap[_Height3]:NEEDS[TPR]
				{
					%offset *= 0.3
				}
				@VertexMitchellNetravaliHeightMap[_Height4]:NEEDS[TPR]
				{
					%deformity *= 0.3
					%offset *= 0.3
				}
				@VertexMitchellNetravaliHeightMap[_Height5]:NEEDS[TPR]
				{
					%deformity *= 0.3
					%offset *= 0.3
				}
			}
		}
    }
}
