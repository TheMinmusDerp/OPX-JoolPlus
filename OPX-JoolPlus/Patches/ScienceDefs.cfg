@EXPERIMENT_DEFINITION:HAS[#id[crewReport]]
{
	@RESULTS
	{
		MetoSrfLandedCrevasses = Perhaps this would be a good spot to shelter from incoming ring particles!  
        MetoSrfLandedPoles = Looking out the window gets you a front-row seat to the best view of Jool in the entire moon system. 
        MetoSrfLandedSurface = The ground feels a bit unstable, and you can almost hear the tremors beneath the surface. 
        MetoInSpaceLow = Meto's surface looks to be substantially less jagged than shepherd moons usually are, almost as if the regular passage through the rings has helped smooth it out.
        MetoInSpaceHigh = The view at the window reminds you of a pecan left under the stove. 
        
        AlnesInSpaceLowLowlands = You look out the window and notice the numerous ridges and rifts covering this area of the surface. They may prove treacherous. 
        AlnesSrfLandedImpactCrater = This place hasn't seen the sun in eons. The darkness reminds you of the old theory of ice in the Mun's polar craters, and your lament at its disproving.
        AlnesInSpaceLowImpactCrater = Looking down, you can only see one viable landing site in this jagged terrain, almost as if it was waiting for you to arrive. How thoughtful!
        AlnesInSpaceHigh = You can't even see the rock you're approaching out the window until you aim the ship correctly. 
        AlnesInSpaceLow = Looking out the window, you can see the numerous ridges and rifts across the surface, looking a bit like taffy being pulled. Landing should be an interesting challenge. 
        
        KlipSrfLandedKesgardImpactTerrain = You stare at the vast landscape of jagged peaks around you, squinting to figure out which one looks like the steepest to climb.
        KlipSrfLandedKelhallaImpactTerrain = You stare at the vast landscape of jagged peaks around you, squinting to figure out which one looks like the steepest to climb.
        KlipSrfLandedLowlands = The rolling hills out the window remind you of Duna, except Duna at least had air. 
        KlipSrfLandedMidlands = The rolling hills out the window remind you of Duna, except Duna at least had air. 
        KlipSrfLandedKofnCraterCentralPeak = It is only now that you realize that the crater looks like a giant pizza, and you have landed on the pizza saver.
        KlipSrfLandedKofnCraterBasin = Jool hangs low in the sky, with its other major moons clearly visible to you. You suddenly wish you brought a spyglass. 
        KlipSrfLandedHighlands = Nothing too special about these highlands, reminds you of the ones back home. 
        KlipSrfLandedChaoticHighlands = They're like the regular highlands, but more chaotic!
        KlipSrfLandedNyernaMassif = This massif is massive! You are running out of ideas for what to put in these. 
        KlipSrfLandedKelhallaCraterComplex = Jool hangs low in the sky, with its other major moons clearly visible to you. You suddenly wish you brought a spyglass. 
        KlipSrfLandedKesgardCraterComplex = This point on the surface faces almost directly away from Jool, out into interplanetary space. The view is far more boring than the description makes it sound. 
        KlipSrfLandedTwinCraters = You can see Jool high above, and due to Klip's state of tidal lock, none of its moons ever slip below the horizon. 
        KlipSrfLandedKedlindaCrater = Due to the crater's high latitude and flat terrain, your position here commands an excellent view of the inner Joolian system. 
        KlipSrfLandedKutgardCrater = Due to the crater's high latitude and flat terrain, your position here commands an excellent view of the inner Joolian system. 
        KlipSrfLandedBeaconCrater = You begin to feel uneasy about being here, as if disturbing something kerbalkind was never meant to know. 
        KlipSrfLandedMeridianCraterComplex = Although it was difficult to find a landing spot here, the terrain looks wonderful out the window now that you have done so.
        KlipSrfLandedKomulCraterComplex = After the dust settled from your landing, the craters stretch as far as the eye can see in this expansive region. 
        KlipInSpaceLow = Finding a landing spot is proving annoying. Over there? No. What about here? No. This crater? Somehow, also no. 
        KlipInSpaceHigh = The view out the porthole makes you think of the old pictures of Moho. Perhaps a distant cousin? 

        JimelInSpaceHigh = Jimel's high inclination and small size would make it a decent place to put a relay satellite or space station, commanding excellent views of the Joolian moon system.
        JimelInSpaceLow = The terrain appears to be amenable to a possible surface base, taking advantage of the moon's supplies of ore for refueling.
        JimelSrfLandedEquatorialLow = You're surprised that you didn't wedge a landing leg in the jagged terrain. You were wrong, a surface base would be a terrible idea here.
        JimelSrfLandedEquatoralHigh = From this vantage point, you can see Jool and its moons clearly even if they're mere specks in the sky. This reminds you of Kerbin seen from minmus. You start to feel a little homesick.
        JimelSrfLandedCraters = Jimel's craters are surprisingly shallow for a moon this small. The moon may be denser than anticipated, or the craters were simply filled in by debris that fell back in after impact.
        JimelSrfLandedPoles = You're surprised that you didn't wedge a landing leg in the jagged terrain. You were wrong, a surface base would be a terrible idea here.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[evaReport]]
{
    @RESULTS
    {
        MetoSrfLandedSurface = You move your boot to kick away a few pebbles, and notice them slowly float away from you. They will never be seen again. 
        MetoSrfLandedCrevasses = It reminds you of the view from the bottom of one of Kerbin's ocean trenches, until you feel an quake and realize that they are very much not the same thing. 
        MetoSrfLandedPoles = Jool looms large in the sky, portending the coming demise of this little moon. Without the crew pod around you, you feel small.
        MetoInSpaceLowSurface = Looking down at Meto, you feel a sudden, uncontrollable longing for peanut brittle. 
        MetoInSpaceLowPoles = You can see the entire Jool system from here! It's quite a spectacular view of the moons. 
        MetoInSpaceLowCrevasses = Your heart tries to sink into your stomach due to the dizzying depth of the crevasses, but it can't on account of the microgravity. 
        MetoInSpaceHigh = You instinctively go to grab the broom to clean up the space under the stove, before realizing that you didn't bring a broom, aren't looking at the underside of a stove, and are in fact in space.
        
        AlnesSrfLandedImpactCrater = Is the surface actually darker, or is it just in the shade?
        AlnesInSpaceLowImpactCrater = The crater is almost a quarter the size of the moon! Whatever did this must have been big.
        AlnesSrfLandedLowlands = You try to take baby steps after forgetting your anchor, but you fly off the surface anyway. 
        AlnesSrfLandedMidlands = You try to take baby steps after forgetting your anchor, but you fly off the surface anyway. 
        AlnesSrfLandedHighlands = You try to take baby steps after forgetting your anchor, but you fly off the surface anyway. 
        AlnesInSpaceHigh = The asteroid reminds you of a velvet cake crumb. 
        AlnesInSpaceLow = You're tempted to grab a taste of the moon now that you're getting closer, but you remember how that went last time and think better of it.
        
        KlipInSpaceHigh = You can clearly see the other three major moons of Jool. The view both awes and saddens you, bringing back memories of being the lonely kid sitting at the edge of the playground waiting in vain for someone to approach.
        KlipInSpaceLowKelhallaImpactTerrain = Looking down, you can see the bizarre terrain of this region. You can't wait to get down there for your foolproof plan to leap the mountains in a single bound!
        KlipInSpaceLowKelhallaCraterComplex = Jool is just rising as you pass over this region. Might be an ideal place to set a surface base just for the view! 
        KlipInSpaceLowMeridianCraterComplex = It looks like these clustered craters might have been formed in the same event. You briefly worry about the possibility of it happening again, before remembering that nothing has changed about this place for billions of years.
        KlipInSpaceLowKomulCraterComplex = It looks like these clustered craters might have been formed in the same event. You briefly worry about the possibility of it happening again, before remembering that nothing has changed about this place for billions of years.
        KlipInSpaceLowKofnCraterBasin = This thing looks to be marginally newer than the rest of the surface. Perhaps one of the last impacts of the great bombardment of the early kerbolar system.
        KlipInSpaceLowKofnCraterCentralPeak = This thing looks to be marginally newer than the rest of the surface. Perhaps one of the last impacts of the great bombardment of the early kerbolar system.
        KlipSrfLandedKelhallaImpactTerrain = The gravity is higher than you thought it was. Your grand plan to leap mountains in a single bound is dashed.
        KlipSrfLandedKesgardImpactTerrain = The gravity is higher than you thought it was. Your grand plan to leap mountains in a single bound is dashed.
        KlipSrfLandedBeaconCrater = You start to feel woozy. Maybe you should get back to the shi i i i i i you didn't think you were outside for <i>that</i> long!
        KlipSrfLandedLowlands = It feels like visiting an old house that hasn't been cleaned in a while. You can't decide whether kicking dust around is vandalism or refurbishment.
        KlipSrfLandedMidlands = The paler shade of brown reminds you of Duna somewhat. You make a call, asking if the moon once had an atmosphere. It did not.
        KlipSrfLandedHighlands = You're reasonably certain that you and the rest of your crew are the only things to happen to this area in the past several billion years.
        KlipSrfLandedChaoticHighlands = You were expecting something more chaotic cnsidering the name on the map, but you'll take what you can get.
        KlipSrfLandedKofnCraterBasin = The flat land is a relief considering the rest of the moon's terrain. 
        KlipSrfLandedKofnCraterCentralPeak = After the hard climb up to the top of the peak, the view is certainly worth it. But you should probably get back to the ship before your air runs out. 
        KlipSrfLandedMeridianCraterComplex = It feels like visiting an old house that hasn't been cleaned in a while. You can't decide whether kicking dust around is vandalism or refurbishment.
        KlipSrfLandedKomulCraterComplex = It feels like visiting an old house that hasn't been cleaned in a while. You can't decide whether kicking dust around is vandalism or refurbishment.
        KlipSrfLandedNyernaMassif = You're reasonably certain that you and the rest of your crew are the only things to happen to this area in the past several billion years.
        KlipSrfLandedTwinCraters = You're reasonably certain that you and the rest of your crew are the only things to happen to this area in the past several billion years.
        
        JimelInSpaceLowEquatorialLow = Jimel's darkened lower regions remind you of the Mun's craters. Perhaps you aren't as far from home as you thought.
        JimelSrfLandedEquatorialLow = The surface threatens to stab you in the foot with each step. The resemblance to the Mun from afar was little more than a facade, and you are just as far from home as you thought.
        JimelInSpaceLowPoles = The moon's terrain looks like a good mountain climbing site, with its low gravity making things that much more fun!
        JimelSrfLandedPoles = The jagged terrain found here is perfect for giving mountain climbers a challenge, but the low gravity makes it far too easy to jump to the top of the mountain... Maybe Long Jumping would be a good local contest instead?
        JimelInSpaceLowCraters = These flat craters seem like a nice place to lie down on!
        JimelSrfLandedCraters = You lament that the terrain is just as jagged as the rest of the Jimelian surface, resulting in the loss of your lie-down spot. 
        JimelInSpaceLowEquatorialHigh = You turn off your flashlight and breath a sigh of relief after seeing the pale terrain in this region.
        JimelSrfLandedEquatoralHigh = This would probably be the best place to put a surface base or rover, as there seems to be no smooth terrain anywhere on this Kodforsaken rock. The KSP will have to make peace with it if they're stubborn enough to go through with landing a camp here.
        JimelInSpaceHigh = You can tell even from here that the dark surface of the moon will make surface navigation difficult. You reflexively check your flashlight's batteries.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[surfaceSample]]
{
    @RESULTS
    {
        MetoSrfLanded = The moon seems to be primarily composed of undifferentiated rock and ice, fused together. If it was made of loose debris, it would have been torn apart by now. 
        
        AlnesSrfLandedLowlands = The sample consists of grayish rocks under a thin layer of tholins. 
        AlnesSrfLandedMidlands = The sample consists of grayish rocks under a thin layer of tholins. 
        AlnesSrfLandedHighlands = The sample consists of grayish rocks under a thin layer of tholins. 
        AlnesSrfLandedImpactCrater = The sample consists of grayish rocks under a thick layer of tholins. This impact is likely the origin of the tholin layer that covers the asteroid. 
        
        KlipSrfLandedKesgardImpactTerrain = The massive impact that created Kesgard Crater has uplifted formerly hidden regions of Klip's structure. The scientists back home will love this!
        KlipSrfLandedKelhallaImpactTerrain = The massive impact that created Kelhalla Crater has uplifted formerly hidden regions of Klip's structure. The scientists back home will love this!
        KlipSrfLandedKesgardCraterComplex = This crater was created in a massive impact, resulting in a very hard and homogenous surface. You need a microscope to make out the mixed-together grains of ice and rock.
        KlipSrfLandedKelhallaCraterComplex = This crater was created in a massive impact, resulting in a very hard and homogenous surface. You need a microscope to make out the mixed-together grains of ice and rock.
        KlipSrfLandedKutgardCrater = Underneath the thin layer of regolith can be found a smooth-ish surface of rock and ice. This moon is clearly undifferentiated. 
        KlipSrfLandedKedlindaCrater = Underneath the thin layer of regolith can be found a smooth-ish surface of rock and ice. This moon is clearly undifferentiated. 
        KlipSrfLandedKofnCraterBasin = It is difficult to get a chunk out of the ground. When you manage it, it is composed primarily of volatile materials.
        KlipSrfLandedKofnCraterCentralPeak = It is difficult to get a chunk out of the ground. When you manage it, it is composed primarily of volatile materials.
        KlipSrfLandedHighlands = Past the layer of dust and regolith, you find basalt and miscellaneous silicate rocks. A bit boring, but expected. 
        KlipSrfLandedNyernaMassif = Past the layer of dust and regolith, you find basalt and miscellaneous silicate rocks. A bit boring, but expected.
        KlipSrfLandedChaoticHighlands = Past the layer of dust and regolith, you find basalt and miscellaneous silicate rocks. A bit boring, but expected.
        KlipSrfLandedMidlands = The sample contains a variety of materials – magnesium and iron-bearing hydrated silicates, carbon and sulfur dioxide, and various organic compounds. 
        KlipSrfLandedLowlands = Visible silicate crystals are everywhere, primarily composed of rhyolite. If you dig a little bit, you find a lighter layer of more volatile material. 
        KlipSrfLandedMeridianCraterComplex =  Underneath the thin layer of regolith can be found a smooth-ish surface of rock and ice. This moon is clearly undifferentiated. 
        KlipSrfLandedKomulCraterComplex = The sample contains a variety of materials – magnesium and iron-bearing hydrated silicates, carbon and sulfur dioxide, and various organic compounds. 
        KlipSrfLandedTwinCraters = The sample contains a variety of materials – magnesium and iron-bearing hydrated silicates, carbon and sulfur dioxide, and various organic compounds. 
        KlipSrfLandedBeaconCrater = ... Solid metal? That's interesting. 

        JimelSrfLandedEquatorialLow = The sample consists largely of darkened rocks. There is surprisingly little ice for a moon this far out, suggesting that this was a captured asteroid from near Dres rather than a centaur or trans-Neidonian object.
        JimelSrfLandedPoles = The sample is made up of mostly carbonaceous compounds, explaining the terrain's darkened color.
        JimelSrfLandedCraters = Similar to elsewhere on the moon, the sample is made up of darkened carbonaceous rocks. However, the crater floors are covered in a thick layer of loosely bound gravel, suggesting that the ground here may not be too stable. 
        JimelSrfLandedEquatoralHigh = The sample, otherwise broadly similar to the rest of the moon, surprisingly contains a sizeable fraction of quartz crystals. The material is only loosely bound together, similar to that found in the crater floors. Perhaps this entire area was kicked up by the impacts that made the moon's craters, and composed of the remains of othe rmeteoroids. Perhaps the quartz came from a piece of a planet or moon blown off in prehistory.

        //
    }
}

