        MolypeleSrfLandedEquatorialHighlands = Molypele's gravity is weakest here. The varied terrain influences the scan slightly.
        MolypeleSrfLandedPolarLowlands = The gravity is strongest here. Khaun's influence on the scanner is more significant than expected.
        MolypeleSrfLandedMidlands = The gravity is comparable to that of Minmus. Very little variation in the asteroid's interior composition.

        KhaunInSpaceHigh = The weak gravity of this moon makes the detector take a bit longer to finish its scan, as to not confuse it with the asteroid it orbits."
        KhaunInSpaceLowHighlands = Khaun lacks much variation in its interior. A pocket of lower mass is detected a few meters below its highest peak, however.
        KhaunInSpaceLowMidlands = Some minor variations in its composition may indicate the presence of minerals absent from Molypele.
        KhaunInSpaceLowLowlands = The very minor tidal stretching from Molypele's gravitational influence is detected.
        KhaunSrfLandedHighlands = The pocket of lower mass may be a large crystal of some sort, as opposed to an underground cave. You aren't sure what to make of this.
        KhaunSrfLandedMidlands = The effective strength of Khaun's gravity fluctuates very slightly as it rotates, primarily due to Molypele's influence.
        KhaunSrfLandedLowlands = The lowest points on Khaun allow for the most precise measurements of its gravity. Still, nothing too unexpected is found in this portion of the moon.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[seismicScan]]
{
    @RESULTS
    {
        MetoSrfLandedSurface = Jool's close proximity is exerting tremendous tidal stress on this little rock. It might be best to leave.
        MetoSrfLandedPoles = Jool's close proximity is exerting tremendous tidal stress on this little rock. It might be best to leave.
        MetoSrfLandedCrevasses = The scan is telling you with great certainty why these massive cracks are here. It's not safe to remain.
        I1-RatorSrfLanded = Faint tremors echo through the moon's structure. Tidal stresses exerted on Rator by Jool, probably.
        AlnesSrfLanded = Tiny impacts from ring particles are detected, but nothing coming from the object's interior. 
        KlipSrfLanded = The seismometer detects absolutely nothing. If you leave it on long enough, you see the occasional spike from a meteoroid impact, but this is but a rare diversion from the enduring silence. 
        JimelSrfLanded = ♫ This rock's not only merely dead, but really most sincerely dead! ♫
        MolypeleSrfLanded = The scanner detects nothing. Molypele is seismically inert.
        KhaunSrfLanded = Dead as a green doorknob.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[barometerScan]]
{
    @RESULTS
    {
        Meto = It <i>does</i> detect something. The pressure is very very low, and doesn't appear to change as the craft moves around the moon. Wait, is it Jool's exosphere? Oh no.

        I1-Rator = Tiny fluctuations are observed. Whatever may be causing this, it certainly isn't Rator.

        Alnes = You write a note to the R&D people asking them to stop assigning barometer measurements to the schedule while you're in space. 
        
        KlipSrfLanded = No atmosphere detected here, how predictable. 
        KlipInSpaceLow = You're in space, what did you expect?
        KlipInSpaceHigh = Even if there was an atmosphere, you certainly wouldn't see it here. 

        JimelSrfLanded = It's an asteroid, what were you expecting?
        JimelInSpaceLow = You think that you have a reading for a second, but nope; it was just a smudge on the gauge.
        JimelInSpaceHigh = The nearest atmosphere is millions of kilometers away.

        MolypeleInSpace = The nearest atmosphere is over a billion kilometers away, and you are unsure of what mission control wants out of this experiment. 
        MolypeleSrfLanded = The pressure reads zero. It would be wise for Kerbals to keep their helmet fastened, even on the surface.

        Khaun = No atmosphere is detected. You decide not to double check this time.
    }
}

@EXPERIMENT_DEFINITION:HAS[#id[magnetometer]]
{
    @RESULTS
    {
        Meto = The magnetometer detects nothing from Meto, overwhelmed as it is by Jool's powerful magnetic field and close proximity. 

        I1-Rator = The intense radiation detected screaming off of Jool interacts with Rator much more than expected. 
        
        Alnes = Jool's magnetic field dominates here. Alnes' passage has little to no effect on its field lines. 
        
        KlipInSpaceLow = Jool's magnetic field doesn't seem to be able to penetrate very far into Klip's crust, suggesting a layer of highly conductive fluid within it at least a kilometer thick. It may be of a similar composition to Laythe's oceans, with high salt content and possibly other antifreezes. 
        KlipInSpaceHigh = Klip appears to be the only major Joolian moon to orbit beyond the planet's extremely dangerous radiation belts, but its magnetic field is still quite strong out here. 
        KlipSrfLanded = Jool's magnetic field doesn't seem to be able to penetrate very far into Klip's crust, suggesting a layer of highly conductive fluid within it at least a kilometer thick. It may be of a similar composition to Laythe's oceans, with high salt content and possibly other antifreezes. 
        
        JimelInSpaceLow = The magnetometer detects the ragged edge of Jool's expansive magnetic field, but nothing from Jimel.
        JimelInSpaceHigh = The magnetometer detects the ragged edge of Jool's expansive magnetic field, but nothing from Jimel.
        JimelSrfLanded = The magnetometer detects the ragged edge of Jool's expansive magnetic field, but nothing from Jimel.

        Molypele = The instrument picks up the faint glow of Kerbol's magnetic field, but nothing from Molypele itself. 

        KhaunInSpaceHigh = The magnetometer finds no trace of a magnetic field coming from this object.
        KhaunInSpaceLow = The magnetometer reads some magnetic activity... Nope, that's just from the Sun.
    }
}

