@EXPERIMENT_DEFINITION:HAS[#id[mysteryGoo]]
{
    @RESULTS
    {
        Meto = The goo curls up into a ball and spins in sync with the asteroid below. 
        I1-RatorInSpace = The goo looks unhappy.
        I1-RatorSrfLanded = The goo seems to have calmed down somewhat.
        Alnes = The goo begins to turn red, then stops after realizing that it's done this already. 
        KlipSrfLanded = The goo makes slow, irregular movements. ...could it be chanting?
        KlipInSpace = The goo begins to vibrate, as if in awe of what its seeing. 
        Jimel = The goo seems to be feeling nostalgic.
        MolypeleInSpaceHigh = The goo does not seem interested in this object.
