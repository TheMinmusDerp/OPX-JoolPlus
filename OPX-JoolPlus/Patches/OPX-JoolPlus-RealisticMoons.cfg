// Orbits
@Kopernicus:HAS[@OPX_JoolPlus_Settings:HAS[#RealisticMoonOrbits[True]]]:FOR[zOPX-JoolPlus]
{
    @Body[Laythe]
    {
        @Orbit
		{
			%semiMajorAxis = 42170000
			%period = 102321.270887938
		}
    }
    @Body[Vall]
    {
        @Orbit
		{
			%semiMajorAxis = 67090000
			%period = 205405.090480762
		}
    }
    @Body[Tylo]
    {
        @Orbit
        {
            %semiMajorAxis = 107040000
			%period = 413483.510942628
			%meanAnomalyAtEpochD = 90
        }
    }
    @Body[Bop]
    {
        @Orbit
		{
			%inclination = 4.774
			%eccentricity = 0.041
			%semiMajorAxis = 188270000
			%longitudeOfAscendingNode = 323.265
			%argumentOfPeriapsis = 275.933
			%meanAnomalyAtEpochD = 85.091
			%epoch = 0
		}
    }
    @Body[Pol]
    {
        @Orbit
		{
			%semiMajorAxis = 739613000
            %eccentricity = 0.2522
            %inclination = 9.281
		}
        @Properties
        {
            %tidallyLocked = False
            %rotationPeriod = 25704 // 7.14 hours
        }
    }
}

